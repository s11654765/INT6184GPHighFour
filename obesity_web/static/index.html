<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Obesity risk prediction (lifestyle)</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Obesity Risk Prediction Based on Lifestyle Habits</h1>
        <p class="subtitle">See if your lifestyle habits are healthy!</p>
        <p class="intro">
          Answer a few questions about your daily habits. The result is an estimate for discussion only—not a
          medical diagnosis.
        </p>
      </header>

      <div class="card">
        <form id="form">
          <fieldset>
            <legend>Your lifestyle</legend>
            <div class="row">
              <label for="high_cal_food">Do you often eat high-calorie foods?</label>
              <select id="high_cal_food" name="high_cal_food">
                <option value="0">No</option>
                <option value="1">Yes</option>
              </select>
            </div>
            <div class="row">
              <label for="veg_consumption">How often do you eat vegetables (e.g. with meals)?</label>
              <select id="veg_consumption" name="veg_consumption">
                <option value="1">Rarely or almost never</option>
                <option value="2" selected>Sometimes / about half of my meals</option>
                <option value="3">Often / most meals</option>
              </select>
            </div>
            <div class="row">
              <label for="water_intake">How much water do you usually drink in a day?</label>
              <select id="water_intake" name="water_intake">
                <option value="1">Little (I often forget or prefer other drinks)</option>
                <option value="2" selected>A moderate amount</option>
                <option value="3">A lot (I drink water regularly through the day)</option>
              </select>
            </div>
            <div class="row two">
              <div>
                <label for="snacking">How often do you snack between meals?</label>
                <select id="snacking" name="snacking">
                  <option value="0">Never</option>
                  <option value="1">Sometimes</option>
                  <option value="2">Frequently</option>
                  <option value="3">Always</option>
                </select>
              </div>
              <div>
                <label for="alcohol">How often do you drink alcohol?</label>
                <select id="alcohol" name="alcohol">
                  <option value="0">Never</option>
                  <option value="1">Sometimes</option>
                  <option value="2">Frequently</option>
                  <option value="3">Always</option>
                </select>
              </div>
            </div>
            <div class="row">
              <label for="smoking">Do you smoke?</label>
              <select id="smoking" name="smoking">
                <option value="0">No</option>
                <option value="1">Yes</option>
              </select>
            </div>
            <div class="row">
              <label for="calorie_monitor">Do you pay attention to calories on labels or when choosing food?</label>
              <select id="calorie_monitor" name="calorie_monitor">
                <option value="0">No</option>
                <option value="1">Yes</option>
              </select>
            </div>
            <div class="row">
              <label for="physical_activity">How physically active are you on a typical day?</label>
              <select id="physical_activity" name="physical_activity">
                <option value="0">Mostly sitting (very little movement)</option>
                <option value="1">Light (short walks, some movement)</option>
                <option value="2" selected>Moderate (regular play, sports, or chores)</option>
                <option value="3">Very active (exercise or sports most days)</option>
              </select>
            </div>
            <div class="row">
              <label for="screen_time">Leisure screen time (phone, TV, games—not schoolwork)</label>
              <select id="screen_time" name="screen_time">
                <option value="0">Low</option>
                <option value="1" selected>Moderate</option>
                <option value="2">High</option>
              </select>
            </div>
            <div class="row">
              <label for="transport">Main way you get around on most days</label>
              <select id="transport" name="transport" required>
                <option value="Public_Transportation">Public transport</option>
                <option value="Walking">Walking</option>
                <option value="Automobile">Car</option>
                <option value="Motorbike">Motorbike</option>
                <option value="Bike">Bicycle</option>
              </select>
            </div>
          </fieldset>

          <button type="submit" id="btn">Get my result</button>
        </form>

        <div id="error"></div>
        <div id="result">
          <h2>Your result</h2>
          <div class="main-pred" id="level-title"></div>
          <p class="advice" id="advice"></p>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("form");
      const btn = document.getElementById("btn");
      const errBox = document.getElementById("error");
      const result = document.getElementById("result");
      const levelTitleEl = document.getElementById("level-title");
      const adviceEl = document.getElementById("advice");

      function showError(msg) {
        errBox.textContent = msg;
        errBox.classList.add("visible");
        result.classList.remove("visible");
      }

      function hideError() {
        errBox.classList.remove("visible");
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();
        btn.disabled = true;

        const payload = {
          high_cal_food: parseInt(document.getElementById("high_cal_food").value, 10),
          veg_consumption: parseFloat(document.getElementById("veg_consumption").value),
          snacking: parseInt(document.getElementById("snacking").value, 10),
          alcohol: parseInt(document.getElementById("alcohol").value, 10),
          smoking: parseInt(document.getElementById("smoking").value, 10),
          water_intake: parseFloat(document.getElementById("water_intake").value),
          calorie_monitor: parseInt(document.getElementById("calorie_monitor").value, 10),
          physical_activity: parseFloat(document.getElementById("physical_activity").value),
          screen_time: parseFloat(document.getElementById("screen_time").value),
          transport: document.getElementById("transport").value,
        };

        try {
          const res = await fetch("/api/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) {
            showError(data.error || "Request failed");
            return;
          }
          levelTitleEl.textContent = data.level_title || data.level_key;
          adviceEl.textContent = data.advice || "";
          result.classList.add("visible");
        } catch (ex) {
          showError("Network error: " + (ex && ex.message ? ex.message : String(ex)));
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
